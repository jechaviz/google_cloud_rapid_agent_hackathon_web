<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AegisOps Incident Agent</title>
  <script src="https://cdn.jsdelivr.net/npm/@unocss/runtime"></script>
  <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vue3-sfc-loader/dist/vue3-sfc-loader.js"></script>
  <style>
    body { margin: 0; font-family: Inter, ui-sans-serif, system-ui, sans-serif; background: #f5f7fb; color: #17202a; }
    [v-cloak] { display: none; }
  </style>
</head>
<body>
  <main id="app" v-cloak></main>
  <script>
    const options = {
      moduleCache: { vue: Vue },
      async getFile(url) {
        const response = await fetch(url);
        if (!response.ok) throw new Error(`${url} ${response.status}`);
        return await response.text();
      },
      addStyle(textContent) {
        const style = Object.assign(document.createElement('style'), { textContent });
        document.head.appendChild(style);
      }
    };
    const { loadModule } = window['vue3-sfc-loader'];
    loadModule('./src/App.vue', options).then((App) => Vue.createApp(App).mount('#app'));
  </script>
</body>
</html>
