<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AegisOps Incident Agent</title>
  <script src="https://cdn.jsdelivr.net/npm/@unocss/runtime"></script>
  <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
  <style>
    body { margin: 0; font-family: Inter, ui-sans-serif, system-ui, sans-serif; background: #f5f7fb; color: #17202a; }
    [v-cloak] { display: none; }
  </style>
</head>
<body>
  <main id="app" v-cloak></main>
  <script>
    async function mountSfc(url) {
      const response = await fetch(url);
      if (!response.ok) throw new Error(`${url} ${response.status}`);
      const source = await response.text();
      const template = source.match(/<template>([\s\S]*?)<\/template>/)[1].trim();
      const script = source.match(/<script>([\s\S]*?)<\/script>/)[1]
        .replace('export default', 'const __component =');
      const component = new Function(`${script}\nreturn __component;`)();
      component.template = template;
      Vue.createApp(component).mount('#app');
    }
    mountSfc('./src/App.vue');
  </script>
</body>
</html>
