<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" role="img" aria-labelledby="title desc">
  <title id="title">AegisOps incident topology</title>
  <desc id="desc">A topology diagram connecting Cloud Run, Gemini, Dynatrace MCP, approval gate, and evidence pack.</desc>
  <rect width="640" height="420" fill="#f8fbff"/>
  <g fill="none" stroke="#9fb3c8" stroke-width="3">
    <path d="M160 120 C250 80 330 80 420 120"/>
    <path d="M160 220 C250 260 330 260 420 220"/>
    <path d="M420 120 L500 170 L420 220"/>
    <path d="M160 120 L80 170 L160 220"/>
  </g>
  <g font-family="Inter,Arial,sans-serif" font-size="18" font-weight="700">
    <rect x="40" y="130" width="130" height="80" rx="8" fill="#1a73e8"/>
    <text x="105" y="164" text-anchor="middle" fill="white">Cloud Run</text>
    <text x="105" y="188" text-anchor="middle" fill="white" font-size="13">V backend</text>
    <rect x="255" y="40" width="130" height="80" rx="8" fill="#673ab7"/>
    <text x="320" y="74" text-anchor="middle" fill="white">Gemini</text>
    <text x="320" y="98" text-anchor="middle" fill="white" font-size="13">planner</text>
    <rect x="255" y="250" width="130" height="80" rx="8" fill="#35a853"/>
    <text x="320" y="284" text-anchor="middle" fill="white">Dynatrace</text>
    <text x="320" y="308" text-anchor="middle" fill="white" font-size="13">MCP tools</text>
    <rect x="470" y="130" width="130" height="80" rx="8" fill="#fbbc04"/>
    <text x="535" y="164" text-anchor="middle" fill="#17202a">Approval</text>
    <text x="535" y="188" text-anchor="middle" fill="#17202a" font-size="13">human gate</text>
    <rect x="255" y="160" width="130" height="80" rx="8" fill="#0f172a"/>
    <text x="320" y="194" text-anchor="middle" fill="white">Evidence</text>
    <text x="320" y="218" text-anchor="middle" fill="white" font-size="13">digest + audit</text>
  </g>
</svg>
